<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月謝計算システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body {
            font-family: 'Inter', 'sans-serif';
            background-color: #f8fafc;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .touch-target {
            min-height: 44px;
        }
        .animate-bounce-short {
            animation: bounce 1s ease-in-out 1;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0) translateX(-50%); }
            50% { transform: translateY(-10px) translateX(-50%); }
        }
        .chip-remove {
            cursor: pointer;
            margin-left: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        .chip-remove:hover {
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-slate-800">月謝計算システム</h1>
            <div class="flex items-center justify-center gap-2 mt-2 text-slate-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2-2v12a2 2 0 002 2z" />
                </svg>
                <span class="font-medium">操作日：<span id="currentDateDisplay"></span></span>
            </div>
        </div>

        <!-- Input Section -->
        <div class="card p-6 mb-8 border-2 border-transparent transition-all" id="inputCard">
            <div class="space-y-4">
                <!-- Month Selection -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">対象月の追加（任意）</label>
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <input type="text" id="monthInput" list="monthOptions" placeholder="例: 2024-08" 
                                class="w-full p-3 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                onkeypress="if(event.key==='Enter') addMonthFromInput()">
                            <datalist id="monthOptions">
                                <!-- Generated by JS -->
                            </datalist>
                        </div>
                        <button onclick="addMonthFromInput()" class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-2 rounded-lg font-bold text-sm transition-colors shadow-sm">
                            追加
                        </button>
                    </div>
                    
                    <!-- Selected Chips Display -->
                    <div id="selectedMonthChips" class="flex flex-wrap gap-2 mt-4 p-3 bg-slate-50 rounded-lg min-h-[50px] border border-dashed border-slate-200">
                        <!-- Chip elements -->
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 border-t pt-4">
                    <div class="md:col-span-1">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">徴収日</label>
                        <input type="date" id="collectionDateInput" 
                            class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none touch-target text-sm">
                    </div>
                    <div class="md:col-span-1">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">お名前</label>
                        <input type="text" id="nameInput" placeholder="例: 山田 太郎" 
                            class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none touch-target text-sm">
                    </div>
                    <div class="md:col-span-1">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">金額 (円)</label>
                        <input type="text" id="amountInput" placeholder="例: 15,000" 
                            oninput="formatAmountInput(this)"
                            class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none touch-target text-sm">
                    </div>
                </div>
            </div>
            
            <div class="flex gap-2 mt-6">
                <button id="submitBtn" onclick="handleSubmit()" 
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition-colors shadow-md touch-target">
                    リストに追加する
                </button>
                <button id="cancelEditBtn" onclick="cancelEdit()" 
                    class="hidden bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-4 px-6 rounded-lg transition-colors touch-target">
                    キャンセル
                </button>
            </div>
        </div>

        <!-- Filter & Total Section -->
        <div class="card p-6 mb-8 bg-blue-50 border-l-4 border-blue-500">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 flex-1">
                    <div>
                        <label class="block text-xs font-bold text-blue-600 uppercase mb-1">対象月で絞り込み</label>
                        <select id="filterMonth" onchange="updateUI()" class="w-full p-2 border border-blue-200 rounded bg-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                            <option value="all">すべて表示</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-blue-600 uppercase mb-1">徴収日で絞り込み</label>
                        <select id="filterDate" onchange="updateUI()" class="w-full p-2 border border-blue-200 rounded bg-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                            <option value="all">すべて表示</option>
                        </select>
                    </div>
                </div>
                <div class="text-right">
                    <div class="flex justify-end items-baseline gap-2">
                        <span class="text-sm font-semibold text-slate-600">合計:</span>
                        <span id="totalDisplay" class="text-3xl font-bold text-blue-700">¥0</span>
                    </div>
                    <div class="text-xs text-slate-500 mt-1">
                        表示中: <span id="countDisplay">0</span> 件
                    </div>
                </div>
            </div>
        </div>

        <!-- List Section -->
        <div class="card overflow-hidden">
            <div id="memberList" class="divide-y divide-slate-100">
                <!-- Members or Empty Message -->
            </div>
        </div>

        <!-- Actions -->
        <div class="mt-6 flex flex-wrap justify-between items-center gap-4">
            <button onclick="clearAll()" class="text-sm text-red-500 hover:text-red-700 font-medium px-2 py-1">
                全データを消去
            </button>
            <div class="flex gap-2">
                <button onclick="copyToClipboard()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium py-2 px-4 rounded-lg border border-slate-200">
                    コピー
                </button>
                <button onclick="exportToText()" class="bg-slate-800 hover:bg-slate-900 text-white text-sm font-medium py-2 px-4 rounded-lg shadow-sm">
                    保存 (TXT)
                </button>
            </div>
        </div>
        
        <p class="mt-8 text-center text-xs text-slate-400">
            ※GitHub Pages等で公開する場合、データはブラウザ（お使いのデバイス）にのみ保存されます。
        </p>
    </div>

    <script>
        let members = [];
        let editId = null;
        let selectedMonths = [];

        function loadData() {
            const saved = localStorage.getItem('monthlyFeeMembers');
            if (saved) {
                members = JSON.parse(saved);
            }
        }

        function saveData() {
            localStorage.setItem('monthlyFeeMembers', JSON.stringify(members));
        }

        window.onload = () => {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            
            document.getElementById('currentDateDisplay').innerText = `${yyyy}年${today.getMonth() + 1}月${today.getDate()}日`;
            document.getElementById('collectionDateInput').value = `${yyyy}-${mm}-${dd}`;
            
            loadData();
            initDatalist();
            updateFilterOptions();
            updateUI();
        };

        function initDatalist() {
            const datalist = document.getElementById('monthOptions');
            const now = new Date();
            let html = '';
            for (let i = -6; i <= 12; i++) {
                const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
                const year = d.getFullYear();
                const month = (d.getMonth() + 1).toString().padStart(2, '0');
                const value = `${year}-${month}`;
                html += `<option value="${value}">${year}年${month}月</option>`;
            }
            datalist.innerHTML = html;
            selectedMonths = [];
            renderChips();
        }

        function addMonthFromInput() {
            const input = document.getElementById('monthInput');
            let val = input.value.trim();
            if (!val) return;
            if (/^\d{6}$/.test(val)) val = val.substring(0, 4) + '-' + val.substring(4);
            if (!selectedMonths.includes(val)) {
                selectedMonths.push(val);
                selectedMonths.sort();
                renderChips();
            }
            input.value = '';
        }

        function removeMonth(val) {
            selectedMonths = selectedMonths.filter(m => m !== val);
            renderChips();
        }

        function renderChips() {
            const container = document.getElementById('selectedMonthChips');
            container.innerHTML = '';
            if (selectedMonths.length === 0) {
                container.innerHTML = '<span class="text-slate-400 text-xs italic">対象月：時期未定（空白）</span>';
                return;
            }
            selectedMonths.forEach(val => {
                const chip = document.createElement('div');
                chip.className = "flex items-center bg-blue-600 text-white text-xs font-bold pl-3 pr-2 py-1.5 rounded-full shadow-sm";
                const label = val.includes('-') ? val.replace('-', '年') + '月' : val;
                chip.innerHTML = `<span>${label}</span><span class="chip-remove" onclick="removeMonth('${val}')">×</span>`;
                container.appendChild(chip);
            });
        }

        function formatAmountInput(input) {
            let rawValue = input.value.replace(/[^\d]/g, '');
            input.value = rawValue ? parseInt(rawValue, 10).toLocaleString('ja-JP') : '';
        }

        function handleSubmit() {
            const nameInput = document.getElementById('nameInput');
            const amountInput = document.getElementById('amountInput');
            const dateInput = document.getElementById('collectionDateInput');
            
            const name = nameInput.value.trim();
            const amount = parseInt(amountInput.value.replace(/,/g, ''));
            const collectionDate = dateInput.value;

            if (!name || isNaN(amount) || !collectionDate) {
                showMessage("徴収日、お名前、金額を入力してください。");
                return;
            }

            if (editId !== null) {
                members = members.map(m => m.id === editId ? { 
                    ...m, 
                    targetMonths: [...selectedMonths], 
                    name, 
                    totalAmount: amount,
                    collectionDate: collectionDate
                } : m);
                showMessage("更新しました。");
                cancelEdit();
            } else {
                members.push({ 
                    id: Date.now(), 
                    targetMonths: [...selectedMonths], 
                    name, 
                    totalAmount: amount, 
                    collectionDate: collectionDate,
                    isPaid: false 
                });
                showMessage("登録しました。");
            }

            nameInput.value = '';
            amountInput.value = '';
            selectedMonths = [];
            renderChips();
            saveData();
            updateFilterOptions();
            updateUI();
        }

        function startEdit(id) {
            const m = members.find(x => x.id === id);
            if (!m) return;
            editId = id;
            selectedMonths = [...m.targetMonths];
            renderChips();
            document.getElementById('nameInput').value = m.name;
            document.getElementById('amountInput').value = m.totalAmount.toLocaleString('ja-JP');
            document.getElementById('collectionDateInput').value = m.collectionDate;
            
            document.getElementById('submitBtn').innerText = "更新を保存";
            document.getElementById('submitBtn').classList.replace('bg-blue-600', 'bg-green-600');
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            document.getElementById('inputCard').classList.add('border-green-500');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editId = null;
            document.getElementById('nameInput').value = '';
            document.getElementById('amountInput').value = '';
            const today = new Date();
            document.getElementById('collectionDateInput').value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            selectedMonths = [];
            renderChips();
            document.getElementById('submitBtn').innerText = "リストに追加する";
            document.getElementById('submitBtn').classList.replace('bg-green-600', 'bg-blue-600');
            document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('inputCard').classList.remove('border-green-500');
        }

        function deleteMember(id) {
            members = members.filter(m => m.id !== id);
            saveData();
            updateFilterOptions();
            updateUI();
        }

        function togglePaid(id) {
            members = members.map(m => m.id === id ? { ...m, isPaid: !m.isPaid } : m);
            saveData();
            updateUI();
        }

        function updateFilterOptions() {
            const monthFilter = document.getElementById('filterMonth');
            const dateFilter = document.getElementById('filterDate');
            
            const curMonth = monthFilter.value;
            const curDate = dateFilter.value;
            
            let usedMonths = [];
            members.forEach(m => usedMonths = usedMonths.concat(m.targetMonths));
            const uniqueMonths = [...new Set(usedMonths)].filter(x => x).sort().reverse();
            const uniqueDates = [...new Set(members.map(m => m.collectionDate))].sort().reverse();
            
            let monthHtml = '<option value="all">すべて表示</option>';
            if (members.some(m => m.targetMonths.length === 0)) monthHtml += '<option value="none">時期未定のみ</option>';
            uniqueMonths.forEach(m => {
                const label = m.includes('-') ? m.replace('-', '年') + '月' : m;
                monthHtml += `<option value="${m}">${label}を含む</option>`;
            });
            monthFilter.innerHTML = monthHtml;
            monthFilter.value = [...monthFilter.options].some(o => o.value === curMonth) ? curMonth : "all";

            let dateHtml = '<option value="all">すべて表示</option>';
            uniqueDates.forEach(d => {
                dateHtml += `<option value="${d}">${d.replace(/-/g, '/')}</option>`;
            });
            dateFilter.innerHTML = dateHtml;
            dateFilter.value = [...dateFilter.options].some(o => o.value === curDate) ? curDate : "all";
        }

        function updateUI() {
            const list = document.getElementById('memberList');
            const monthFilterVal = document.getElementById('filterMonth').value;
            const dateFilterVal = document.getElementById('filterDate').value;
            
            let filtered = members.filter(m => {
                const matchMonth = (monthFilterVal === "all") || 
                                   (monthFilterVal === "none" && m.targetMonths.length === 0) || 
                                   (m.targetMonths.includes(monthFilterVal));
                const matchDate = (dateFilterVal === "all") || (m.collectionDate === dateFilterVal);
                return matchMonth && matchDate;
            });

            filtered.sort((a, b) => b.collectionDate.localeCompare(a.collectionDate));

            if (filtered.length === 0) {
                list.innerHTML = '<div class="p-8 text-center text-slate-400">表示できるデータがありません</div>';
                document.getElementById('totalDisplay').innerText = '¥0';
                document.getElementById('countDisplay').innerText = '0';
                return;
            }

            let html = '';
            let total = 0;
            filtered.forEach(m => {
                total += m.totalAmount;
                const mInfo = m.targetMonths.length === 0 ? "時期未定" : m.targetMonths.map(x => x.split('-')[1] + '月').join(', ');
                const displayDate = m.collectionDate.replace(/-/g, '/');
                
                html += `
                    <div class="flex items-center justify-between p-4 hover:bg-slate-50 transition-colors">
                        <div class="flex items-center gap-4 flex-1">
                            <input type="checkbox" ${m.isPaid ? 'checked' : ''} onchange="togglePaid(${m.id})" class="w-6 h-6 rounded border-slate-300 text-blue-600">
                            <div>
                                <div class="${m.isPaid ? 'line-through text-slate-400' : 'text-slate-800'} font-bold text-base">
                                    ${escapeHtml(m.name)}
                                </div>
                                <div class="flex flex-wrap gap-x-3 gap-y-1 mt-0.5">
                                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">対象: ${mInfo}</span>
                                    <span class="text-[10px] text-blue-500 font-bold tracking-tight">徴収日: ${displayDate}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-bold text-lg ${m.isPaid ? 'text-slate-400' : 'text-slate-700'}">¥${m.totalAmount.toLocaleString()}</span>
                            <div class="flex items-center">
                                <button onclick="startEdit(${m.id})" class="text-slate-300 hover:text-blue-500 p-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                                </button>
                                <button onclick="deleteMember(${m.id})" class="text-slate-300 hover:text-red-500 p-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html;
            document.getElementById('totalDisplay').innerText = `¥${total.toLocaleString()}`;
            document.getElementById('countDisplay').innerText = filtered.length;
        }

        function showMessage(t) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg z-50 text-sm animate-bounce-short";
            toast.innerText = t;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function escapeHtml(s) {
            const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
        }

        // 文字列の表示幅（半角1、全角2として計算）を取得する関数
        function getDisplayWidth(str) {
            let width = 0;
            for (let i = 0; i < str.length; i++) {
                const charCode = str.charCodeAt(i);
                if (charCode >= 0x00 && charCode <= 0x7f) {
                    width += 1;
                } else {
                    width += 2;
                }
            }
            return width;
        }

        function generateExportText() {
            const monthFilterVal = document.getElementById('filterMonth').value;
            const dateFilterVal = document.getElementById('filterDate').value;
            
            let filtered = members.filter(m => {
                const matchMonth = (monthFilterVal === "all") || 
                                   (monthFilterVal === "none" && m.targetMonths.length === 0) || 
                                   (m.targetMonths.includes(monthFilterVal));
                const matchDate = (dateFilterVal === "all") || (m.collectionDate === dateFilterVal);
                return matchMonth && matchDate;
            });
            
            filtered.sort((a, b) => b.collectionDate.localeCompare(a.collectionDate));

            const dateHeader = dateFilterVal !== "all" ? dateFilterVal.replace(/-/g, '/') : new Date().toLocaleDateString('ja-JP').replace(/\//g, '/');
            
            let total = 0;
            const rows = filtered.map(m => {
                total += m.totalAmount;
                const mInfo = m.targetMonths.length === 0 ? "時期未定" : m.targetMonths.map(x => parseInt(x.split('-')[1]) + '月').join('、');
                return {
                    label: `${m.name}（${mInfo}）`,
                    amount: m.totalAmount.toLocaleString() + "円"
                };
            });

            const totalStr = total.toLocaleString() + "円";
            const TOTAL_LINE_WIDTH = 42; // 全体の基準幅を微調整

            let t = `本日の月謝　：${dateHeader}\n`;
            t += `------------------------------------------\n`;
            
            rows.forEach(r => {
                const labelWidth = getDisplayWidth(r.label);
                const amountWidth = getDisplayWidth(r.amount);
                // 合計金額と同じ位置に末尾が来るようドットの数を調整
                const dotsCount = Math.max(2, TOTAL_LINE_WIDTH - labelWidth - amountWidth);
                const dots = ".".repeat(dotsCount);
                t += `${r.label}${dots}${r.amount}\n`;
            });
            
            t += `------------------------------------------\n`;
            const totalLabel = "合　計";
            const totalLabelWidth = getDisplayWidth(totalLabel);
            const totalAmountWidth = getDisplayWidth(totalStr);
            // 合計ラベルと合計金額の間のドット数を、各行と同じ幅になるように計算
            const totalDotsCount = Math.max(2, TOTAL_LINE_WIDTH - totalLabelWidth - totalAmountWidth);
            const totalDots = ".".repeat(totalDotsCount);
            
            t += `${totalLabel}${totalDots}${totalStr}\n`;
            
            return t;
        }

        function copyToClipboard() {
            if (members.length === 0) return;
            const text = generateExportText();
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showMessage("金額と合計を右揃えでコピーしました");
        }

        function exportToText() {
            if (members.length === 0) return;
            const dateFilterVal = document.getElementById('filterDate').value;
            const dateStr = dateFilterVal !== "all" ? dateFilterVal : new Date().toISOString().split('T')[0];
            
            const blob = new Blob([generateExportText()], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `月謝記録_${dateStr}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showMessage(`「月謝記録_${dateStr}.txt」を保存しました`);
        }

        function clearAll() {
            if (confirm("全消去しますか？（復元できません）")) { 
                members = []; 
                localStorage.removeItem('monthlyFeeMembers');
                updateFilterOptions(); 
                updateUI(); 
                showMessage("全データを削除しました");
            }
        }
    </script>
</body>
</html>
